# Preflight checks
- name: Verify SSH Client is installed
  command: ssh -V
  register: ssh_check
  changed_when: false
  failed_when: ssh_check.rc != 0

- name: Fail if SSH is not available
  fail:
    msg: "SSH is required before configuring git. Ensure Common/ssh ran successfully"
  when: ssh_check.rc != 0

# SSH key setup
- name: Ensure .ssh directory exists
  file:
    path: "~/.ssh"
    state: directory
    mode: "0700"

- name: Generate SSH key (if none exists)
  openssh_keypair:
    path: "~/.ssh/id_ed25519"
    type: ed25519
    force: false

- name: Configure ssh-agent behavior
  lineinfile:
    path: "~/.ssh/config"
    create: yes
    mode: "0600"
    line: "AddKeysToAgent yes"
